version: '2'
services:
  php:
    container_name: itlink-yii2-php
    image: yiisoftware/yii2-php:8.4-fpm-nginx
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - '${YII_EXTERNAL_PORT}:80'
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - YII_ENV=${YII_ENV}
      - YII_DEBUG=${YII_DEBUG}

  postgres:
    container_name: itlink-yii2-postgres
    image: postgres:latest
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - '${DB_EXTERNAL_PORT}:5432'

volumes:
  postgres_data:
